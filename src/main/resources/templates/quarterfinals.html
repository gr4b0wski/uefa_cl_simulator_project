<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Lista Drużyn</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://use.fontawesome.com/releases/v5.4.1/css/all.css">
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"
    />
    <style>
        body {
            color: white;
        }
        .background {
                background-image: url("/images/stadium.jpg");
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                filter: blur(8px); /* Rozmycie tła */
                z-index: 0;
                background-attachment: fixed;
            }
        .fi {
            width: 36px;
            line-height: 27px;
            border-radius: 3px;
        }
        .table td, .table th {
            padding: 0.2rem;
            background: rgba(0, 0, 0, 0.5);
        }
        .container {
            padding: 40px;
            margin: 0 auto;
            text-align: center;
        }
        #counter, .selected {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.5);
        }
        .wybierz {
            position: absolute;
            top: 15px;
            text-align: center;
            width: 100%;
        }
        .btn-custom {
                position: fixed;
                font-size: 11px;
                font-weight: 700;
                right: 36%;
                top: 50%;
                width: 129px;
                height: 43px;
                margin: 0 auto;
                vertical-align: middle;
                background: linear-gradient(135deg, #0329fe, #cd3dff); /* Gradient granatowo-niebieski */
                color: white;
                border: none;
                border-radius: 5px;
                text-decoration: none;
                display: inline-block;
                text-align: center;
                transition: background 0.6s ease, transform 0.3s ease; /* Płynne przejście tła i transformacji */
            }

            /* Efekt hover dla przycisku */
            .btn-custom:hover {
                color: white;
                text-decoration: none;
                background: linear-gradient(45deg, #cd3dff, #0329fe); /* Zmiana kierunku gradientu na hover */
                transform: scale(1.05); /* Lekka animacja powiększenia przycisku */
            }
            .league-table {
                position: fixed;
                top: 0;
                width: 40%;
                right: 40px;
            }
            .col-md-7 {
                right: 80px;
            }
            .league-table {
                padding: 0px;
            }
            .league-table td {
                font-size: 9px;
                height: 15px !important;
                text-align: center;
                vertical-align: middle;
                border-spacing: 0px;
                padding: 0px;
                line-height: 0px;
            }
            .league-table th {
                text-align: center;
                vertical-align: middle;
                font-size: 12px;
                padding: 0px;
            }
            .league-table .fi {
                width: 20px;
                height: 15px;
            }
        .place-green-dark {
            color: white;
            background: rgba(0, 255, 0, 0.8);
        }

        /* Jasnozielony dla miejsc 9-24 */
        .place-green-light {
            color: white;
            background: rgba(160, 255, 160, 0.8);
        }
    </style>
</head>
<body>
<div class="background"></div>
<form id="simulateForm" th:action="'/simulateQuarterfinals'" method="get">
    <button type="submit" class="btn btn-custom" id="simulateButton" th:text="${buttonText ?: 'Simulate quarterfinals'}">
        Simulate quarterfinals
    </button>
</form>
<div>
    <div class="container my-2">
        <div class="col-md-7">
            <h1>Knockout Stage</h1>
            <div class="selected text-center">Quarterfinals</div>
            <table class="table table-bordered">
                <thead>
                <tr>
                    <th class="col-md-1"></th>
                    <th class="col-md-2">Home</th>
                    <th class="col-md-1" style="width: 4%"></th>
                    <th class="col-md-1" style="width: 4%"></th>
                    <th class="col-md-2">Away</th>
                    <th class="col-md-1"></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="match, iter : ${knockoutMatches}" th:if="${iter.index >= 16 and iter.index < 20}">
                    <td><span th:class="'fi fi-' + ${match.team1.countryCode}"></span></td>
                    <td th:text="${match.team1.teamName}"></td>
                    <td th:text="${match.played ? match.goals1 : ''}"></td>
                    <td th:text="${match.played ? match.goals2 : ''}"></td>
                    <td th:text="${match.team2.teamName}"></td>
                    <td><span th:class="'fi fi-' + ${match.team2.countryCode}"></span></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>

<script>
    // JavaScript dla zmiany tekstu przycisku i endpointu
    const simulateButton = document.getElementById('simulateButton');
    const simulateForm = document.getElementById('simulateForm');

    // Sprawdzenie stanu przycisku po załadowaniu strony
    if (simulateButton.textContent === "Go to semifinals") {
        simulateForm.setAttribute('action', '/semifinals');
    }

    simulateButton.addEventListener('click', function () {
        if (simulateButton.textContent === "Simulate quarterfinals") {
            simulateButton.textContent = "Go to semifinals";
        }
    });
</script>

</html>
