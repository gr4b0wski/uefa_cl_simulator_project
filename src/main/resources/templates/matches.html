<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Lista Drużyn</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://use.fontawesome.com/releases/v5.4.1/css/all.css">
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"
    />
    <style>
        body {
            color: white;
        }
        .background {
                background-image: url("/images/stadium.jpg");
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                filter: blur(8px); /* Rozmycie tła */
                z-index: 0;
                background-attachment: fixed;
            }
        .fi {
            width: 36px;
            line-height: 27px;
            border-radius: 3px;
        }
        .table td, .table th {
            padding: 0.2rem;
            background: rgba(0, 0, 0, 0.5);
        }
        .container {
            padding: 40px;
            margin: 0 auto;
            text-align: center;
        }
        #counter, .selected {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.5);
        }
        .wybierz {
            position: absolute;
            top: 15px;
            text-align: center;
            width: 100%;
        }
        .btn-custom {
                position: fixed;
                font-size: 11px;
                font-weight: 700;
                right: 36%;
                top: 50%;
                width: 129px;
                height: 43px;
                margin: 0 auto;
                vertical-align: middle;
                background: linear-gradient(135deg, #0329fe, #cd3dff); /* Gradient granatowo-niebieski */
                color: white;
                border: none;
                border-radius: 5px;
                text-decoration: none;
                display: inline-block;
                text-align: center;
                transition: background 0.6s ease, transform 0.3s ease; /* Płynne przejście tła i transformacji */
            }

            /* Efekt hover dla przycisku */
            .btn-custom:hover {
                color: white;
                text-decoration: none;
                background: linear-gradient(45deg, #cd3dff, #0329fe); /* Zmiana kierunku gradientu na hover */
                transform: scale(1.05); /* Lekka animacja powiększenia przycisku */
            }
            .league-table {
                position: fixed;
                top: 0;
                width: 40%;
                right: 40px;
            }
            .col-md-7 {
                right: 80px;
            }
            .league-table {
                padding: 0px;
            }
            .league-table td {
                font-size: 9px;
                height: 15px !important;
                text-align: center;
                vertical-align: middle;
                border-spacing: 0px;
                padding: 0px;
                line-height: 0px;
            }
            .league-table th {
                text-align: center;
                vertical-align: middle;
                font-size: 12px;
                padding: 0px;
            }
            .league-table .fi {
                width: 20px;
                height: 15px;
            }
        .place-green-dark {
            color: white;
            background: rgba(0, 255, 0, 0.8);
        }

        /* Jasnozielony dla miejsc 9-24 */
        .place-green-light {
            color: white;
            background: rgba(160, 255, 160, 0.8);
        }
    </style>
</head>
<body>
<div class="background"></div>
<div class="wybierz">
    <span style="font-weight: bold; text-shadow: 2px 2px 5px black;">League phase</span>
</div>
<form th:action="${currentFixture <= 8 ? '/simulate' : '/knockouts'}" method="get">
    <!-- Przycisk zmieniający tekst i akcję w zależności od kolejki -->
    <button type="submit" class="btn btn-custom"
            th:text="${currentFixture <= 8 ? 'Simulate Fixture ' + currentFixture : 'To the KO stage'}">
    </button>
</form>
<div class="league-table" style="width: 345px;">
    <table class="table table-bordered">
        <thead>
        <tr>
            <th style="width: 25px; font-weight: bold;">No.</th>
            <th style="width: 25px"></th>
            <th style="width: 120px;">Team</th>
            <th style="width: 25px; font-weight: bold;">Pt</th>
            <th style="width: 25px">P</th>
            <th style="width: 25px">W</th>
            <th style="width: 25px">D</th>
            <th style="width: 25px">L</th>
            <th style="width: 25px">GF</th>
            <th style="width: 25px">GA</th>
            <th style="width: 25px">GD</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="team, iter : ${standings}" th:class="${iter.index + 1 <= 8 ? 'place-green-dark' : (iter.index + 1 <= 24 ? 'place-green-light' : '')}">
            <td th:text="${iter.index + 1}"></td>
            <td><span th:class="'fi fi-' + ${team.countryCode}"></span></td>
            <td th:text="${team.teamName}"></td>
            <td th:text="${team.points}" style="font-weight: 700"></td>
            <td th:text="${team.played}"></td>
            <td th:text="${team.won}"></td>
            <td th:text="${team.drawn}"></td>
            <td th:text="${team.lost}"></td>
            <td th:text="${team.goalsFor}"></td>
            <td th:text="${team.goalsAgainst}"></td>
            <td th:text="${team.goalDifference}"></td>
        </tr>
        </tbody>
    </table>
</div>
