<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Lista Drużyn</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://use.fontawesome.com/releases/v5.4.1/css/all.css">
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"
    />
    <style>
        body {
            color: white;
        }
        .background {
            background-image: url("/images/stadium.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            filter: blur(8px);
            z-index: 0;
            background-attachment: fixed;
        }
        .fi {
            width: 36px;
            line-height: 27px;
            border-radius: 3px;
        }
        .table td, .table th {
            padding: 0.2rem;
            background: rgba(0, 0, 0, 0.5);
        }
        .container {
            padding: 40px;
            margin: 0 auto;
            text-align: center;
        }
        #counter, .selected {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.5);
        }
        .wybierz {
            position: absolute;
            top: 15px;
            text-align: center;
            width: 100%;
        }

        /* Nowe style dla przycisku */
        .btn-custom {
            position: fixed;
            font-size: 11px;
            font-weight: 700;
            right: 550px; /* Przesunięto w lewo, bliżej terminarza */
            top: 50%;
            transform: translateY(-50%);
            width: 129px;
            height: 43px;
            margin: 0;
            background: linear-gradient(135deg, #0329fe, #cd3dff);
            color: white;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            transition: background 0.6s ease, transform 0.3s ease;
            z-index: 100;
        }

        .btn-custom:hover {
            color: white;
            text-decoration: none;
            background: linear-gradient(45deg, #cd3dff, #0329fe);
            transform: translateY(-50%) scale(1.05);
        }

        .col-md-7 {
            right: 80px;
        }

        /* Nowe style dla tabeli */
        .league-table {
            position: fixed;
            top: 0;
            right: 20px;
            width: 420px;
            height: 100vh;
            z-index: 10;
            /* Usunięto padding, aby wykorzystać 100% ekranu */
        }

        .league-table .table {
            height: 100vh;
            margin-bottom: 0;
        }

        .league-table td, .league-table th {
            font-size: 1.8vh;
            text-align: center;
            vertical-align: middle;
            padding: 0 !important;
            height: calc(100vh / 42); /* Zmiana z 38 na 40 robi miejsce na krawędzie (bordery) tabeli */
            line-height: 1;
        }

        .league-table .fi {
            width: 2.4vh;
            height: 1.6vh;
            display: inline-block; /* Wymuszenie zachowania blokowego dla wyśrodkowania */
            margin: 0 auto; /* Wyśrodkowanie w poziomie */
            vertical-align: middle; /* Wyśrodkowanie w pionie względem tekstu */
        }

        .place-green-dark {
            color: white;
            background: rgba(0, 255, 0, 0.8);
        }

        .place-green-light {
            color: white;
            background: rgba(160, 255, 160, 0.8);
        }
    </style>
</head>
<body>
<div class="background"></div>
<div class="wybierz">
    <span style="font-weight: bold; text-shadow: 2px 2px 5px black;">League phase</span>
</div>
<form th:action="${currentFixture <= 8 ? '/simulate' : '/knockouts'}" method="get">
    <button type="submit" class="btn btn-custom"
            th:text="${currentFixture <= 8 ? 'Simulate Fixture ' + currentFixture : 'To the KO stage'}">
    </button>
</form>
<div class="league-table">
    <table class="table table-bordered">
        <thead>
        <tr>
            <th style="width: 25px; font-weight: bold;">No.</th>
            <th style="width: 25px"></th>
            <th style="width: 195px;">Team</th>
            <th style="width: 25px; font-weight: bold;">Pt</th>
            <th style="width: 25px">P</th>
            <th style="width: 25px">W</th>
            <th style="width: 25px">D</th>
            <th style="width: 25px">L</th>
            <th style="width: 25px">GF</th>
            <th style="width: 25px">GA</th>
            <th style="width: 25px">GD</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="team, iter : ${standings}" th:class="${iter.index + 1 <= 8 ? 'place-green-dark' : (iter.index + 1 <= 24 ? 'place-green-light' : '')}">
            <td th:text="${iter.index + 1}"></td>
            <td><span th:class="'fi fi-' + ${team.countryCode}"></span></td>
            <td th:text="${team.teamName}"></td>
            <td th:text="${team.points}" style="font-weight: 700"></td>
            <td th:text="${team.played}"></td>
            <td th:text="${team.won}"></td>
            <td th:text="${team.drawn}"></td>
            <td th:text="${team.lost}"></td>
            <td th:text="${team.goalsFor}"></td>
            <td th:text="${team.goalsAgainst}"></td>
            <td th:text="${team.goalDifference}"></td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function(event) {
        var scrollpos = localStorage.getItem('scrollpos');
        if (scrollpos) {
            window.scrollTo(0, scrollpos);
            localStorage.removeItem('scrollpos');
        }
    });

    window.onbeforeunload = function(e) {
        localStorage.setItem('scrollpos', window.scrollY);
    };
</script>
