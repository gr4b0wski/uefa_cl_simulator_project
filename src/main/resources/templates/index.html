<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>UEFA Champions League Simulator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://use.fontawesome.com/releases/v5.4.1/css/all.css">
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"
    />
    <style>
        /* Ustawienia dla html i body */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ustawienie tła jako flexbox */
        .background {
            background-image: url("/images/stadium.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            filter: blur(8px); /* Rozmycie tła */
            z-index: 0;
        }

        /* Wyśrodkowanie kontenera */
        .container {
            position: absolute;
            z-index: 1; /* Kontener jest nad tłem */
            color: white;
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5); /* Półprzezroczyste tło */
            border-radius: 10px; /* Zaokrąglone rogi */
        }

        .btn-custom {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 18px;
            background: linear-gradient(135deg, #0329fe, #cd3dff); /* Gradient granatowo-niebieski */
            color: white;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            transition: background 0.6s ease, transform 0.3s ease; /* Płynne przejście tła i transformacji */
        }

        /* Efekt hover dla przycisku */
        .btn-custom:hover {
            color: white;
            text-decoration: none;
            background: linear-gradient(45deg, #cd3dff, #0329fe); /* Zmiana kierunku gradientu na hover */
            transform: scale(1.05); /* Lekka animacja powiększenia przycisku */
        }
        .authors {
            z-index: 1;
            position: absolute;
            top: 10px;
            left: 10px;
        }
    </style>
</head>
<body>

<!-- Tło -->
<div class="background"></div>
<div class="authors">
    <span style="color: white; font-weight: bold; text-shadow: 2px 2px 5px black;">Gabriel Grabowski, Aleksander Brandt</span>
</div>

<!-- Główna zawartość -->
<div class="container">
    <h1>UEFA Champions League Simulator</h1>
    <!-- Przycisk kierujący do zakładki /teams -->
    <a href="/teams" class="btn-custom"><b>Pick 36 teams</b></a>
</div>


</body>
</html>
